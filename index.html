function invSearch() {
  pageStates.inventory.search = document.getElementById('invSearch').value.trim();
  loadInventory();
}

/* =================================================================================
 *  PAGE 7: Synthesis — 合成配方
 * ================================================================================= */
async function loadSynthesis() {
  var search = pageStates.synthesis.search;
  var catId = pageStates.synthesis.category;
  var calcMode = pageStates.synthesis.calcMode;

  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var qs = [];
    if (search) qs.push('search=' + encodeURIComponent(search));
    if (catId) qs.push('category_id=' + catId);
    var url = '/api/synthesis' + (qs.length ? '?' + qs.join('&') : '');
    var data = await api(url);
    var recipes = data.recipes || [];

    var calcData = null, calcMap = {};
    if (calcMode) {
      calcData = await api('/api/synthesis/calculate').catch(function(){ return {}; });
      [].concat(calcData.can_synth||[], calcData.miss_one||[], calcData.miss_more||[], calcData.no_match||[]).forEach(function(e) {
        calcMap[e.recipe_id] = e.ratio >= 1 ? 'can' : (e.owned > 0 ? (e.ratio >= 0.5 ? 'miss1' : 'miss2') : 'none');
      });
    }

    var calcSummaryHtml = '';
    if (calcMode && calcData) {
      calcSummaryHtml = '<div class="calc-summary">' +
        '<div class="calc-summary-item s-can" onclick="synthCalcFilter(\'can\')" id="calcSum_can">✅ 可合成 ' + (calcData.can_synth||[]).length + ' 个</div>' +
        '<div class="calc-summary-item s-miss1" onclick="synthCalcFilter(\'miss1\')" id="calcSum_miss1">⚠️ 缺1件 ' + (calcData.miss_one||[]).length + ' 个</div>' +
        '<div class="calc-summary-item s-miss2" onclick="synthCalcFilter(\'miss2\')" id="calcSum_miss2">🔴 缺多件 ' + (calcData.miss_more||[]).length + ' 个</div>' +
        '<div style="color:var(--text2);font-size:11px;align-self:center">📦 库存 ' + (calcData.inventory_count||0) + ' 种 | 配方 ' + (calcData.total_recipes||0) + ' 个</div>' +
      '</div>';
    }

    var synthCats = await api('/api/synthesis/categories').catch(function(){ return []; });
    var synthCatOpts = '<option value="">全部分类</option>' + synthCats.map(function(c) {
      return '<option value="' + c.id + '"' + (String(c.id)===String(catId)?' selected':'') + '>' + (c.name||c.categoryname) + '</option>';
    }).join('');

    var calcFilter = pageStates.synthesis.calcFilter || '';
    var cards = recipes.map(function(r) {
      var calcStatus = calcMap[r.id] || '';
      if (calcFilter && calcStatus !== calcFilter) return '';
      var borderClass = calcStatus === 'can' ? ' can-synth' : (calcStatus === 'miss1' ? ' miss-one' : (calcStatus === 'miss2' ? ' miss-more' : (calcStatus === 'none' ? ' no-match' : '')));
      var calcBadge = '';
      if (calcMode && calcStatus) {
        var label = calcStatus === 'can' ? '✅ 可合成' : (calcStatus === 'miss1' ? '⚠️ 缺1件' : (calcStatus === 'miss2' ? '🔴 缺多件' : ''));
        if (label) calcBadge = '<span class="calc-badge ' + calcStatus + '">' + label + '</span>';
      }
      var inputs = (r.inputs||[]).map(function(inp) {
        return '<span style="background:var(--bg);padding:2px 8px;border-radius:4px;font-size:11px">' +
          (inp.amount||1) + 'x ' + (inp.item_name||'?') + '</span>';
      }).join(' ');
      var outputs = (r.outputs||[]).map(function(out) {
        return '<span style="background:rgba(212,168,67,0.15);padding:2px 8px;border-radius:4px;font-size:11px;color:var(--gold)">' +
          (out.amount||1) + 'x ' + (out.item_name||'?') + '</span>';
      }).join(' ');
      return '<div class="stat-card synth-card' + borderClass + '" style="text-align:left;padding:14px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
          '<strong style="font-size:13px;color:var(--text)">' + (r.title||'?') + '</strong>' +
          '<span class="badge badge-cyan">' + (r.categoryname||'-') + '</span>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">' +
          inputs + ' <span style="color:var(--cyan)">➜</span> ' + outputs +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">' +
          (calcMode ? calcBadge : '') +
          '<div style="margin-left:auto">' +
            '<button class="btn btn-cyan btn-xs" onclick="editSynthesis(' + r.id + ')">✏️</button>' +
            '<button class="btn btn-danger btn-xs" onclick="deleteSynthesis(' + r.id + ')">🗑️</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    c.innerHTML =
      '<div class="search-bar">' +
        '<input class="search-input" id="synthSearch" placeholder="🔍 搜索配方名称或材料..." value="' + escHtml(search) + '" onkeydown="if(event.key===\'Enter\')synthSearch()">' +
        '<button class="btn btn-cyan btn-sm" onclick="synthSearch()">搜索</button>' +
        (search ? '<span class="search-clear" onclick="synthClearSearch()">✕ 清除</span>' : '') +
        '<span style="margin-left:8px;color:var(--text2);font-size:12px">分类：</span>' +
        '<select id="synthCatFilter" onchange="synthFilterCat()" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;max-width:180px">' + synthCatOpts + '</select>' +
      '</div>' +
      '<div class="btn-group">' +
        '<button class="btn btn-primary" onclick="showAddSynthesis()">➕ 新建配方</button>' +
        '<button class="btn btn-cyan btn-sm" onclick="loadSynthesis()">🔄 刷新</button>' +
        '<button class="btn btn-sm" style="' + (calcMode?'background:var(--gold);color:#000':'') + '" onclick="synthToggleCalc()">🧮 计算器' + (calcMode ? ' ON' : '') + '</button>' +
        '<span style="color:var(--text2);font-size:12px">共 ' + (data.total||recipes.length) + ' 个配方</span>' +
      '</div>' +
      calcSummaryHtml +
      '<div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(340px,1fr))">' +
        (cards || '<div class="empty">暂无合成配方</div>') +
      '</div>';
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

function synthToggleCalc() {
  pageStates.synthesis.calcMode = !pageStates.synthesis.calcMode;
  pageStates.synthesis.calcFilter = '';
  loadSynthesis();
}
function synthCalcFilter(status) {
  pageStates.synthesis.calcFilter = (pageStates.synthesis.calcFilter === status) ? '' : status;
  document.querySelectorAll('.calc-summary-item').forEach(function(el){ el.classList.remove('s-active'); });
  if (pageStates.synthesis.calcFilter) {
    var el = document.getElementById('calcSum_' + status);
    if (el) el.classList.add('s-active');
  }
  loadSynthesis();
}

function synthSearch() {
  pageStates.synthesis.search = document.getElementById('synthSearch').value.trim();
  loadSynthesis();
}
function synthClearSearch() { document.getElementById('synthSearch').value = ''; pageStates.synthesis.search = ''; loadSynthesis(); }
function synthFilterCat() {
  pageStates.synthesis.category = document.getElementById('synthCatFilter').value;
  loadSynthesis();
}

// --- Synthesis CRUD ---
function showAddSynthesis() {
  showModal('➕ 新建合成配方', true,
    '<div class="form-group"><label>配方名称</label><input id="f_stitle" placeholder="如：炼制丹药"></div>' +
    '<div class="form-group"><label>备注</label><textarea id="f_snote"></textarea></div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label>输入材料 (ID:数量, 用逗号分隔)</label><input id="f_sinputs" placeholder="如 1:2, 3:1"></div>' +
      '<div class="form-group"><label>输出产物 (ID:数量, 用逗号分隔)</label><input id="f_soutputs" placeholder="如 5:1"></div>' +
    '</div>' +
    '<p style="font-size:10px;color:var(--text2);margin-bottom:12px">提示：可在商店管理页面查看物品ID。格式为 item_id:数量，多项用英文逗号分隔。</p>' +
    '<div class="modal-actions">' +
      '<button class="btn btn-cyan" onclick="closeModal()">取消</button>' +
      '<button class="btn btn-primary" onclick="addSynthesis()">创建</button>' +
    '</div>'
  );
}

function parseItemPairs(str) {
  if (!str.trim()) return [];
  return str.split(',').map(function(p) {
    var parts = p.trim().split(':');
    return { item_id: parseInt(parts[0]), amount: parseInt(parts[1]) || 1 };
  }).filter(function(p) { return p.item_id > 0; });
}

function addSynthesis() {
  var data = {
    title: document.getElementById('f_stitle').value,
    note: document.getElementById('f_snote').value,
    category_id: 1,
    inputs: parseItemPairs(document.getElementById('f_sinputs').value),
    outputs: parseItemPairs(document.getElementById('f_soutputs').value)
  };
  if (!data.title) return toast('请输入配方名称', 'error');
  if (data.inputs.length === 0) return toast('请至少输入一个材料', 'error');
  if (data.outputs.length === 0) return toast('请至少输入一个产物', 'error');
  api('/api/synthesis/add', { method: 'POST', body: JSON.stringify(data) }).then(function() {
    closeModal();
    loadSynthesis();
    toast('✅ 配方创建成功');
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

function editSynthesis(id) {
  api('/api/synthesis').then(function(data) {
    var r = (data.recipes||[]).find(function(x) { return x.id === id; });
    if (!r) return toast('未找到配方', 'error');
    var inpStr = (r.inputs||[]).map(function(x) { return x.item_id + ':' + x.amount; }).join(', ');
    var outStr = (r.outputs||[]).map(function(x) { return x.item_id + ':' + x.amount; }).join(', ');
    showModal('✏️ 编辑配方 #' + id, true,
      '<div class="form-group"><label>配方名称</label><input id="f_stitle" value="' + escAttr(r.title||'') + '"></div>' +
      '<div class="form-group"><label>备注</label><textarea id="f_snote">' + escHtml(r.note||'') + '</textarea></div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>输入材料 (ID:数量)</label><input id="f_sinputs" value="' + escAttr(inpStr) + '"></div>' +
        '<div class="form-group"><label>输出产物 (ID:数量)</label><input id="f_soutputs" value="' + escAttr(outStr) + '"></div>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-cyan" onclick="closeModal()">取消</button>' +
        '<button class="btn btn-primary" onclick="updateSynthesis(' + id + ')">保存</button>' +
      '</div>'
    );
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

function updateSynthesis(id) {
  var data = {
    id: id,
    title: document.getElementById('f_stitle').value,
    note: document.getElementById('f_snote').value,
    category_id: 1,
    inputs: parseItemPairs(document.getElementById('f_sinputs').value),
    outputs: parseItemPairs(document.getElementById('f_soutputs').value)
  };
  api('/api/synthesis/update', { method: 'POST', body: JSON.stringify(data) }).then(function() {
    closeModal();
    loadSynthesis();
    toast('✅ 已更新');
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

function deleteSynthesis(id) {
  if (!confirm('确定删除此配方？')) return;
  api('/api/synthesis/delete', { method: 'POST', body: JSON.stringify({id: id}) }).then(function() {
    loadSynthesis();
    toast('🗑️ 已删除');
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

/* =================================================================================
 *  PAGE 8: History — 活动记录
 * ================================================================================= */
async function loadHistory() {
  var df = pageStates.history.dateFrom;
  var dt = pageStates.history.dateTo;
  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var data = await api('/api/history?limit=200');
    var events = data.events || [];

    // Date range filter (client-side, timestamp in ms)
    var fromMs = df ? new Date(df).getTime() : null;
    var toMs = dt ? new Date(dt + 'T23:59:59').getTime() : null;
    if (fromMs || toMs) {
      events = events.filter(function(e) {
        if (fromMs && e.ts < fromMs) return false;
        if (toMs && e.ts > toMs) return false;
        return true;
      });
    }

    var taskCount = 0, itemCount = 0;
    var items = events.map(function(e) {
      var icon = e.type === 'task' ? '✅' : '📦';
      var body;
      if (e.type === 'task') { taskCount++;
        body = '<strong>' + (e.name||'?') + '</strong> 完成 ×' + (e.count||1) +
               ' | 奖励 🪙' + (e.coin||0) + ' ✨' + (e.exp||0);
      } else { itemCount++;
        var dir = e.is_decrease ? '消耗' : '获得';
        body = '<strong>' + (e.name||'?') + '</strong> ' + dir + ' ' + (e.change||0) + ' 件';
        if (e.desc) body += ' <span style="color:var(--text2);font-size:11px">(' + e.desc + ')</span>';
      }
      return '<div class="timeline-item">' +
        '<div class="timeline-time">' + (e.time||'') + '</div>' +
        '<div class="timeline-body">' + icon + ' ' + body + '</div>' +
      '</div>';
    }).join('');

    c.innerHTML =
      '<div class="btn-group" style="flex-wrap:wrap;align-items:center">' +
        '<button class="btn btn-cyan btn-sm" onclick="loadHistory()">🔄 刷新</button>' +
        '<label style="color:var(--text2);font-size:11px;margin-left:8px">从</label>' +
        '<input id="histDateFrom" type="date" value="' + df + '" onchange="histDateChange()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px">' +
        '<label style="color:var(--text2);font-size:11px">到</label>' +
        '<input id="histDateTo" type="date" value="' + dt + '" onchange="histDateChange()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px">' +
        (df||dt ? '<button class="btn btn-sm btn-red" onclick="histClearDate()">✕ 清除</button>' : '') +
        '<span style="color:var(--text2);font-size:12px;margin-left:8px">任务 ' + taskCount + ' | 物品 ' + itemCount + ' | 共 ' + events.length + ' 条</span>' +
        '<span style="margin-left:auto"></span>' +
        '<button class="btn btn-sm btn-purple" onclick="exportTable(\'history\')">📥 导出</button>' +
      '</div>' +
      '<div class="timeline">' + (items || '<div class="empty">暂无匹配的活动记录</div>') + '</div>';
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}
function histDateChange() {
  pageStates.history.dateFrom = document.getElementById('histDateFrom').value;
  pageStates.history.dateTo = document.getElementById('histDateTo').value;
  loadHistory();
}
function histClearDate() {
  pageStates.history.dateFrom = ''; pageStates.history.dateTo = '';
  document.getElementById('histDateFrom').value = '';
  document.getElementById('histDateTo').value = '';
  loadHistory();
}

/* =================================================================================
 *  PAGE 9: Pools — 卡池管理
 * ================================================================================= */
async function loadPools() {
  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var data = await api('/api/pools');
    var pools = data.pools || [];

    var poolCards = pools.map(function(p) {
      var entries = (p.entries||[]).map(function(e) {
        var badgeColor = e.is_fixed ? 'badge-gold' : (e.probability > 50 ? 'badge-purple' : 'badge-cyan');
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(30,58,95,0.2)">' +
          '<span style="font-size:12px">' + (e.icon&&e.icon.startsWith('http') ? '<img src="' + e.icon + '" style="width:18px;height:18px;vertical-align:middle;margin-right:4px;border-radius:3px">' : '🎴') + ' ' + (e.item_name||'?') + '</span>' +
          '<span>' +
            '<span class="badge ' + badgeColor + '" style="margin-right:4px">' + (e.probability||0) + '%</span>' +
            (e.is_fixed ? '<span class="badge badge-gold">固定</span>' : '') +
            ' <span style="font-size:10px;color:var(--text2)">×' + (e.amount||1) + '</span>' +
          '</span>' +
        '</div>';
      }).join('');

      return '<div class="stat-card" style="text-align:left;padding:14px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
          '<strong style="font-size:13px;color:var(--text)">🎰 ' + (p.itemname||'卡池 #'+p.id) + '</strong>' +
          '<span class="badge badge-cyan">' + (p.entries.length||0) + ' 项</span>' +
        '</div>' +
        entries +
        '<div style="text-align:right;margin-top:8px">' +
          '<button class="btn btn-cyan btn-xs" onclick="editPool(' + p.id + ')">✏️ 编辑概率</button>' +
        '</div>' +
      '</div>';
    }).join('');

    c.innerHTML =
      '<div class="btn-group">' +
        '<button class="btn btn-cyan btn-sm" onclick="loadPools()">🔄 刷新</button>' +
        '<span style="color:var(--text2);font-size:12px">卡池 ' + (data.pool_count||pools.length) + ' 个 | 其他效果 ' + (data.effect_count||0) + ' 个</span>' +
      '</div>' +
      '<div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">' +
        (poolCards || '<div class="empty">暂无卡池</div>') +
      '</div>';
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

function editPool(id) {
  api('/api/pools').then(function(data) {
    var p = (data.pools||[]).find(function(x) { return x.id === id; });
    if (!p) return toast('未找到卡池', 'error');
    var entriesHtml = (p.entries||[]).map(function(e, idx) {
      return '<div class="form-row" style="margin-bottom:8px">' +
        '<div class="form-group"><label>物品</label><input value="' + escAttr(e.item_name||e.item_id) + '" readonly style="background:var(--bg3);font-size:11px"></div>' +
        '<div class="form-group"><label>概率(%)</label><input type="number" id="pe_prob_' + idx + '" value="' + (e.probability||0) + '" style="width:80px"></div>' +
        '<div class="form-group"><label>数量</label><input type="number" id="pe_amt_' + idx + '" value="' + (e.amount||1) + '" style="width:60px"></div>' +
        '<div class="form-group"><label>固定</label><select id="pe_fixed_' + idx + '" style="width:70px"><option value="0"' + (e.is_fixed?'':' selected') + '>否</option><option value="1"' + (e.is_fixed?' selected':'') + '>是</option></select></div>' +
      '</div>';
    }).join('');
    showModal('✏️ 编辑卡池 #' + id, true,
      entriesHtml +
      '<div class="modal-actions">' +
        '<button class="btn btn-cyan" onclick="closeModal()">取消</button>' +
        '<button class="btn btn-primary" onclick="savePool(' + id + ',' + (p.entries||[]).length + ')">保存</button>' +
      '</div>'
    );
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

function savePool(id, count) {
  var entries = [];
  for (var i = 0; i < count; i++) {
    entries.push({
      item_id: 0,
      probability: parseInt(document.getElementById('pe_prob_' + i).value) || 0,
      amount: parseInt(document.getElementById('pe_amt_' + i).value) || 1,
      is_fixed: document.getElementById('pe_fixed_' + i).value === '1'
    });
  }
  api('/api/pools/update', { method: 'POST', body: JSON.stringify({ id: id, entries: entries }) }).then(function() {
    closeModal();
    loadPools();
    toast('✅ 卡池已更新');
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

/* =================================================================================
 *  PAGE 10: Achievement Progress — 成就进度
 * ================================================================================= */
async function loadAchProgress() {
  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var data = await api('/api/achievements/progress');
    var achs = data.achievements || [];
    var statusMap = {0:'未完成', 1:'已完成', 2:'已领取'};

    var rows = achs.map(function(a) {
      var progBar = '';
      if (a.current_total !== undefined && a.target_total > 0) {
        progBar = '<div class="progress-bar" style="margin-top:4px"><div class="progress-fill cyan" style="width:' + (a.total_progress||0) + '%"></div></div>' +
                  '<div style="font-size:10px;color:var(--text2)">' + (a.current_total||0) + '/' + (a.target_total||0) + '</div>';
      } else if (a.progress !== undefined && a.progress > 0) {
        progBar = '<div class="progress-bar" style="margin-top:4px"><div class="progress-fill cyan" style="width:' + (a.progress||0) + '%"></div></div>';
      }

      var statusColor = a.achievementstatus >= 1 ? 'green' : 'red';
      return '<div class="stat-card" style="text-align:left;padding:12px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
          '<span style="font-size:13px;font-weight:600">' + (a.content||'?') + '</span>' +
          '<span class="badge badge-' + statusColor + '">' + (statusMap[a.achievementstatus]||a.achievementstatus) + '</span>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--text2);margin-bottom:4px">' + (a.description||'') + '</div>' +
        '<div style="font-size:11px;color:var(--text2)">分类: ' + (a.categoryname||'-') + ' | 奖励: 🪙' + (a.rewardcoin||0) + '</div>' +
        progBar +
      '</div>';
    }).join('');

    c.innerHTML =
      '<div class="btn-group">' +
        '<button class="btn btn-cyan btn-sm" onclick="loadAchProgress()">🔄 刷新</button>' +
        '<span style="color:var(--text2);font-size:12px">已完成 ' + (data.completed||0) + '/' + (data.total||achs.length) + '</span>' +
      '</div>' +
      '<div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))">' +
        (rows || '<div class="empty">暂无成就进度</div>') +
      '</div>';
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

/* =================================================================================
 *  PAGE 11: Collection — 卡牌图鉴
 * ================================================================================= */
async function loadCollection() {
  var search = pageStates.collection.search;
  var rarity = pageStates.collection.rarity;

  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var qs = [];
    if (search) qs.push('search=' + encodeURIComponent(search));
    if (rarity) qs.push('rarity=' + rarity);
    var url = '/api/collection' + (qs.length ? '?' + qs.join('&') : '');
    var data = await api(url);
    var groups = data.groups || {};
    var stats = data.stats || {};

    var rarityOrder = ['SSR', 'SR', 'R', 'N'];
    var rarityColors = {
      'SSR': 'var(--gold)',
      'SR': 'var(--purple)',
      'R': 'var(--cyan)',
      'N': 'var(--text2)'
    };

    var sections = rarityOrder.map(function(r) {
      var cards = groups[r] || [];
      if (cards.length === 0) return '';
      var s = stats[r] || { total: 0, owned: 0 };
      var cardsHtml = cards.map(function(card) {
        var isOwned = card.owned > 0;
        return '<div class="card-item' + (isOwned ? ' owned' : '') + '">' +
          '<div class="card-icon">' + (card.icon&&card.icon.startsWith('http') ? '<img src="' + card.icon + '" style="width:36px;height:36px;border-radius:6px">' : '🃏') + '</div>' +
          '<div class="card-name">' + (card.itemname||'?') + '</div>' +
          '<div class="card-rarity" style="color:' + (rarityColors[r]||'var(--text2)') + '">' + r + (isOwned ? ' ✅' : '') + '</div>' +
          (isOwned ? '<div style="font-size:9px;color:var(--gold)">拥有: ' + card.owned + '</div>' : '') +
        '</div>';
      }).join('');

      return '<div style="margin-bottom:20px">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">' +
          '<span style="font-size:15px;font-weight:700;color:' + (rarityColors[r]||'var(--text2)') + '">' + r + '</span>' +
          '<span style="font-size:11px;color:var(--text2)">' + s.owned + '/' + s.total + '</span>' +
          '<div class="progress-bar" style="width:120px"><div class="progress-fill gold" style="width:' + (s.total>0?s.owned/s.total*100:0) + '%"></div></div>' +
        '</div>' +
        '<div class="card-grid">' + cardsHtml + '</div>' +
      '</div>';
    }).join('');

    c.innerHTML =
      '<div class="search-bar">' +
        '<input class="search-input" id="collSearch" placeholder="🔍 搜索卡牌名称..." value="' + escHtml(search) + '" onkeydown="if(event.key===\'Enter\')collSearch()">' +
        '<button class="btn btn-cyan btn-sm" onclick="collSearch()">搜索</button>' +
        (search ? '<span class="search-clear" onclick="collClearSearch()">✕ 清除</span>' : '') +
      '</div>' +
      '<div class="btn-group">' +
        '<button class="btn btn-cyan btn-sm" onclick="loadCollection()">🔄 刷新</button>' +
        '<span style="color:var(--text2);font-size:12px;margin-left:8px">稀有度：</span>' +
        '<span class="filter-tag' + (rarity===''?' active':'') + '" onclick="collSetRarity(\'\')">全部</span>' +
        '<span class="filter-tag' + (rarity==='SSR'?' active':'') + '" onclick="collSetRarity(\'SSR\')" style="color:var(--gold)">SSR</span>' +
        '<span class="filter-tag' + (rarity==='SR'?' active':'') + '" onclick="collSetRarity(\'SR\')" style="color:var(--purple)">SR</span>' +
        '<span class="filter-tag' + (rarity==='R'?' active':'') + '" onclick="collSetRarity(\'R\')" style="color:var(--cyan)">R</span>' +
        '<span class="filter-tag' + (rarity==='N'?' active':'') + '" onclick="collSetRarity(\'N\')" style="color:var(--text2)">N</span>' +
      '</div>' +
      '<div style="margin-bottom:16px;padding:12px;background:var(--bg3);border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">' +
        '<span style="font-size:13px">📊 收集进度：<strong style="color:var(--gold)">' + (data.total_owned||0) + '</strong>/<strong>' + (data.total||0) + '</strong> (' + (data.completion_rate||0) + '%)</span>' +
        '<div class="progress-bar" style="width:200px"><div class="progress-fill gold" style="width:' + (data.completion_rate||0) + '%"></div></div>' +
      '</div>' +
      (sections || '<div class="empty">暂无卡牌数据</div>');
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

function collSearch() {
  pageStates.collection.search = document.getElementById('collSearch').value.trim();
  loadCollection();
}
function collClearSearch() { document.getElementById('collSearch').value = ''; pageStates.collection.search = ''; loadCollection(); }
function collSetRarity(r) {
  pageStates.collection.rarity = r;
  loadCollection();
}

/* =================================================================================
 *  PAGE 12: Economy — 经济看板
 * ================================================================================= */
async function loadEconomy() {
  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var data = await api('/api/economy');
    var last14 = data.last_14 || [];

    var maxCoin = last14.reduce(function(m, d) { return Math.max(m, d.coin); }, 0) || 1;
    var maxExp = last14.reduce(function(m, d) { return Math.max(m, d.exp); }, 0) || 1;

    var chartBars = last14.map(function(d) {
      var coinH = Math.round(d.coin / maxCoin * 150) || 2;
      var expH = Math.round(d.exp / maxExp * 150) || 2;
      var dateLabel = d.date.slice(5);
      return '<div class="chart-col">' +
        '<div style="display:flex;gap:2px;align-items:flex-end;height:160px">' +
          '<div class="chart-bar coin" style="height:' + coinH + 'px" title="🪙 ' + d.coin + '"></div>' +
          '<div class="chart-bar exp" style="height:' + expH + 'px" title="✨ ' + d.exp + '"></div>' +
        '</div>' +
        '<div class="chart-value">🪙' + (d.coin||0) + '</div>' +
        '<div class="chart-value">✨' + (d.exp||0) + '</div>' +
        '<div class="chart-label">' + dateLabel + '</div>' +
      '</div>';
    }).join('');

    var topDays = (data.daily||[]).slice().sort(function(a, b) { return b.coin - a.coin; }).slice(0, 5);

    c.innerHTML =
      '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-label">💎 总收入(金币)</div><div class="stat-value gold">' + ((data.total_coin||0).toLocaleString()) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">✨ 总经验</div><div class="stat-value purple">' + ((data.total_exp||0).toLocaleString()) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">📊 日均金币</div><div class="stat-value cyan">' + ((data.avg_daily_coin||0).toLocaleString()) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">📅 活跃天数</div><div class="stat-value green">' + (data.days||0) + '</div></div>' +
      '</div>' +
      '<div class="section-title">📈 最近 14 天经济趋势</div>' +
      '<div style="padding:8px;font-size:10px;color:var(--text2);margin-bottom:8px">🟡 金币 | 🟣 经验 | 悬浮查看数值</div>' +
      '<div class="chart-row" style="overflow-x:auto">' + chartBars + '</div>' +
      (topDays.length > 0 ?
        '<div class="section-title">🏆 TOP 5 收入日</div>' +
        '<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>日期</th><th>金币</th><th>经验</th><th>次数</th></tr></thead>' +
        '<tbody>' + topDays.map(function(d) { return '<tr><td>' + d.date + '</td><td>🪙 ' + (d.coin||0).toLocaleString() + '</td><td>✨ ' + (d.exp||0).toLocaleString() + '</td><td>' + (d.count||0) + '</td></tr>'; }).join('') + '</tbody></table></div>' : '') +
      '<div class="btn-group" style="margin-top:12px"><button class="btn btn-cyan btn-sm" onclick="loadEconomy()">🔄 刷新</button></div>';
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

/* =================================================================================
 *  PAGE 13: Snapshots — 快照管理
 * ================================================================================= */
function getSnapshots() {
  try { return JSON.parse(localStorage.getItem('lifeup_snapshots') || '[]'); } catch(e) { return []; }
}
function saveSnapshots(snaps) {
  localStorage.setItem('lifeup_snapshots', JSON.stringify(snaps));
}

function loadSnapshots() {
  var c = document.getElementById('content');
  var snaps = getSnapshots();

  var rows = snaps.map(function(s, idx) {
    return '<tr>' +
      '<td>' + (s.name||'Snapshot #'+idx) + '</td>' +
      '<td>' + (s.path||'') + '</td>' +
      '<td>' + (s.time||'') + '</td>' +
      '<td>' + (s.size||'?') + '</td>' +
      '<td>' +
        '<button class="btn btn-cyan btn-sm" onclick="restoreSnapshot(' + idx + ')">📂 恢复</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteSnapshot(' + idx + ')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  c.innerHTML =
    '<div class="btn-group">' +
      '<button class="btn btn-primary" onclick="createSnapshot()">📸 创建快照</button>' +
      '<button class="btn btn-cyan btn-sm" onclick="loadSnapshots()">🔄 刷新</button>' +
      '<span style="color:var(--text2);font-size:12px">共 ' + snaps.length + ' 个快照（存储在浏览器本地）</span>' +
    '</div>' +
    '<p style="font-size:11px;color:var(--text2);margin-bottom:12px">快照记录备份文件的路径和状态，方便快速切换。实际数据取决于服务器当前加载的存档。</p>' +
    '<div style="overflow-x:auto"><table class="data-table">' +
      '<thead><tr><th>名称</th><th>路径</th><th>时间</th><th>大小</th><th>操作</th></tr></thead>' +
      '<tbody>' + (rows || '<tr><td colspan="5" class="empty">暂无快照</td></tr>') + '</tbody>' +
    '</table></div>';
}

function createSnapshot() {
  showModal('📸 创建快照',
    '<p style="font-size:12px;color:var(--text2);margin-bottom:12px">保存当前加载的存档路径作为快照，方便以后快速切换。</p>' +
    '<div class="form-group"><label>快照名称</label><input id="f_snapname" placeholder="如：2024年1月存档"></div>' +
    '<div class="modal-actions">' +
      '<button class="btn btn-cyan" onclick="closeModal()">取消</button>' +
      '<button class="btn btn-primary" onclick="doCreateSnapshot()">📸 创建</button>' +
    '</div>'
  );
  setTimeout(function() { var inp = document.getElementById('f_snapname'); if (inp) inp.focus(); }, 100);
}
function doCreateSnapshot() {
  var name = document.getElementById('f_snapname').value.trim() || 'Snapshot';
  var path = localStorage.getItem('lifeup_backup_path') || '';
  var snaps = getSnapshots();
  snaps.push({
    name: name,
    path: path,
    time: new Date().toLocaleString(),
    size: '?'
  });
  saveSnapshots(snaps);
  closeModal();
  loadSnapshots();
  toast('📸 快照已创建');
}
function restoreSnapshot(idx) {
  var snaps = getSnapshots();
  var s = snaps[idx];
  if (!s || !s.path) return toast('快照数据不完整', 'error');
  if (!confirm('确定切换到快照 "' + (s.name||'') + '" 吗？当前未保存的修改将丢失。')) return;
  _loadBackup(s.path).then(function() {
    toast('📂 已切换到快照: ' + (s.name||''));
  }).catch(function(e) { toast('❌ 恢复失败: ' + e.message, 'error'); });
}
function deleteSnapshot(idx) {
  if (!confirm('确定删除此快照？')) return;
  var snaps = getSnapshots();
  snaps.splice(idx, 1);
  saveSnapshots(snaps);
  loadSnapshots();
  toast('🗑️ 快照已删除');
}

/* =================================================================================
 *  PAGE 14: Realms — 位面切换
 * ================================================================================= */
function getRealms() {
  try { return JSON.parse(localStorage.getItem('lifeup_realms') || '[]'); } catch(e) { return []; }
}
function saveRealms(realms) {
  localStorage.setItem('lifeup_realms', JSON.stringify(realms));
}

function loadRealms() {
  var c = document.getElementById('content');
  var realms = getRealms();
  var current = localStorage.getItem('lifeup_backup_path') || '';

  var rows = realms.map(function(r, idx) {
    var isActive = r.path === current;
    return '<tr' + (isActive ? ' style="background:rgba(212,168,67,0.08)"' : '') + '>' +
      '<td>' + (isActive ? '⭐ ' : '') + (r.name||'Realm #'+idx) + (isActive ? ' <span class="badge badge-gold">当前</span>' : '') + '</td>' +
      '<td style="font-family:monospace;font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (r.path||'') + '</td>' +
      '<td>' + (r.desc||'') + '</td>' +
      '<td>' +
        (isActive ? '' : '<button class="btn btn-cyan btn-sm" onclick="switchRealm(' + idx + ')">🔄 切换</button>') +
        '<button class="btn btn-danger btn-sm" onclick="deleteRealm(' + idx + ')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  c.innerHTML =
    '<div class="btn-group">' +
      '<button class="btn btn-primary" onclick="addRealmDialog()">➕ 添加位面</button>' +
      '<button class="btn btn-cyan btn-sm" onclick="loadRealms()">🔄 刷新</button>' +
      '<span style="color:var(--text2);font-size:12px">共 ' + realms.length + ' 个位面</span>' +
    '</div>' +
    '<p style="font-size:11px;color:var(--text2);margin-bottom:12px">位面即不同的 LifeUp 备份存档。你可以管理多个存档并在它们之间快速切换。</p>' +
    '<div style="overflow-x:auto"><table class="data-table">' +
      '<thead><tr><th>位面名称</th><th>路径</th><th>描述</th><th>操作</th></tr></thead>' +
      '<tbody>' + (rows || '<tr><td colspan="4" class="empty">暂无其他位面。点击"添加位面"来管理多个存档。</td></tr>') + '</tbody>' +
    '</table></div>';
}

function addRealmDialog() {
  showModal('🌌 添加位面',
    '<div class="form-group"><label>位面名称</label><input id="f_rname" placeholder="如：地球Online存档"></div>' +
    '<div class="form-group"><label>备份文件路径</label><input id="f_rpath" placeholder="C:\\Users\\...\\LifeupBackup.zip" style="font-family:Consolas,monospace"></div>' +
    '<div class="form-group"><label>描述（可选）</label><input id="f_rdesc" placeholder="如：2024年3月"></div>' +
    '<div class="modal-actions">' +
      '<button class="btn btn-cyan" onclick="closeModal()">取消</button>' +
      '<button class="btn btn-primary" onclick="doAddRealm()">添加</button>' +
    '</div>'
  );
}
function doAddRealm() {
  var name = document.getElementById('f_rname').value.trim();
  var path = document.getElementById('f_rpath').value.trim();
  var desc = document.getElementById('f_rdesc').value.trim();
  if (!name) return toast('请输入位面名称', 'error');
  if (!path) return toast('请输入文件路径', 'error');
  var realms = getRealms();
  realms.push({ name: name, path: path, desc: desc });
  saveRealms(realms);
  closeModal();
  loadRealms();
  toast('🌌 位面已添加');
}
function switchRealm(idx) {
  var realms = getRealms();
  var r = realms[idx];
  if (!r || !r.path) return toast('位面数据不完整', 'error');
  if (!confirm('确定切换到位面 "' + (r.name||'') + '" 吗？当前未保存的修改将丢失。')) return;
  _loadBackup(r.path).then(function() {
    localStorage.setItem('lifeup_backup_path', r.path);
    toast('🔄 已切换到位面: ' + (r.name||''));
  }).catch(function(e) { toast('❌ 切换失败: ' + e.message, 'error'); });
}
function deleteRealm(idx) {
  if (!confirm('确定删除此位面？')) return;
  var realms = getRealms();
  realms.splice(idx, 1);
  saveRealms(realms);
  loadRealms();
  toast('🗑️ 位面已删除');
}

/* =================================================================================
 *  Export Utility
 * ================================================================================= */
function exportTable(table) {
  api('/api/export/' + table + '?format=csv').then(function(text) {
    var blob = new Blob(['\uFEFF' + text], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'lifeup_' + table + '_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    toast('📥 ' + table + ' 导出成功');
  }).catch(function(e) { toast('❌ 导出失败: ' + e.message, 'error'); });
}

/* =================================================================================
 *  HTML Escape Helpers
 * ================================================================================= */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* =================================================================================
 *  Auto-load on Startup
 * ================================================================================= */
window.addEventListener('DOMContentLoaded', function() {
  if (IS_DESKTOP) {
    try {
      window.pywebview.api.get_last_path().then(function(path) {
        if (path) _loadBackup(path, true);
      });
    } catch(e) { /* first run */ }
    return;
  }
  var saved = localStorage.getItem('lifeup_backup_path') || DEFAULT_PATH;
  var inp = document.getElementById('pathInput');
  if (inp) inp.value = saved;
  _loadBackup(saved, true).catch(function() { /* server not running */ });
});
</script>
