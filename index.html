<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诸天万界 · LifeUp 存档管理器</title>
<style>
:root {
  --bg: #0a0e17; --bg2: #111827; --bg3: #1a2332; --border: #1e3a5f;
  --text: #c9d1d9; --text2: #8b949e; --gold: #d4a843; --gold2: #f0c060;
  --cyan: #56b6c2; --cyan2: #7acfd6; --red: #e0556a; --green: #4caf50;
  --purple: #a78bfa; --purple2: #c4b5fd; --orange: #e09040;
  --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; overflow: hidden;
}
.sidebar {
  width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 16px 0; flex-shrink: 0;
}
.sidebar-title {
  padding: 0 20px 20px; font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px;
}
.nav-item {
  padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  font-size: 14px; color: var(--text2); transition: all 0.2s; border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(212,168,67,0.08); }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header {
  padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.header h2 { font-size: 16px; font-weight: 600; color: var(--cyan); }
.conn-status { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; }
.conn-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
.conn-dot.offline { background: var(--red); }
.file-path {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  padding: 4px 10px; border-radius: 4px; font-size: 11px; max-width: 300px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace;
}
.content { flex: 1; overflow-y: auto; padding: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; text-align: center;
}
.stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.stat-value { font-size: 28px; font-weight: 700; }
.stat-value.gold { color: var(--gold); }
.stat-value.cyan { color: var(--cyan); }
.stat-value.purple { color: var(--purple); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: var(--bg2); padding: 10px 12px; text-align: left; font-weight: 600;
  color: var(--cyan); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1;
}
.data-table td { padding: 8px 12px; border-bottom: 1px solid rgba(30,58,95,0.3); }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.btn {
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 4px;
}
.btn-primary { background: var(--gold); color: #000; }
.btn-primary:hover { background: var(--gold2); }
.btn-cyan { background: var(--cyan); color: #000; }
.btn-cyan:hover { background: var(--cyan2); }
.btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-green { background: var(--green); color: #000; }
.btn-green:hover { filter: brightness(1.2); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-group { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; width: 520px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow);
}
.modal h3 { color: var(--gold); margin-bottom: 16px; font-size: 16px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 13px; font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab {
  padding: 6px 16px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--text2); transition: all 0.2s;
}
.tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
.progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.progress-fill.gold { background: var(--gold); }
.progress-fill.cyan { background: var(--cyan); }
.progress-fill.purple { background: var(--purple); }
.loading { text-align: center; padding: 40px; color: var(--text2); }
.spinner {
  display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
}
.badge-cyan { background: rgba(86,182,194,0.2); color: var(--cyan); }
.badge-gold { background: rgba(212,168,67,0.2); color: var(--gold); }
.badge-purple { background: rgba(167,139,250,0.2); color: var(--purple); }
.badge-red { background: rgba(224,85,106,0.2); color: var(--red); }
.badge-green { background: rgba(76,175,80,0.2); color: var(--green); }
.filter-tag {
  padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; transition: all 0.2s;
  background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
}
.filter-tag.active { background: var(--cyan); color: #000; border-color: var(--cyan); }
.toast {
  position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 200;
  transform: translateY(100px); opacity: 0; transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-title">☯ 诸天万界</div>
  <nav>
    <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> 修行总览</div>
    <div class="nav-item" data-page="tasks"><span class="nav-icon">📋</span> 任务管理</div>
    <div class="nav-item" data-page="items"><span class="nav-icon">🏪</span> 商店管理</div>
    <div class="nav-item" data-page="achievements"><span class="nav-icon">🏆</span> 成就管理</div>
    <div class="nav-item" data-page="skills"><span class="nav-icon">⚔️</span> 属性面板</div>
    <div class="nav-item" data-page="inventory"><span class="nav-icon">🎒</span> 背包物品</div>
  </nav>
</aside>

<div class="main">
  <header class="header">
    <h2 id="pageTitle">📊 修行总览</h2>
    <div class="conn-status">
      <span class="file-path" id="filePath" title="">未加载存档</span>
      <div class="conn-dot offline" id="connDot"></div>
      <span id="connText">未加载</span>
      <button class="btn btn-cyan btn-sm" onclick="showOpenDialog()">📂 打开存档</button>
      <button class="btn btn-green btn-sm" id="saveBtn" onclick="saveBackup()" disabled>💾 保存</button>
    </div>
  </header>
  <div class="content" id="content">
    <div class="empty" style="padding: 60px 40px">
      <div class="empty-icon">📂</div>
      <h3 style="color:var(--gold);margin-bottom:12px">欢迎使用 LifeUp 存档管理器</h3>
      <p style="margin-bottom:20px;color:var(--text2)">输入 LifeUp 备份文件的完整路径来加载</p>
      <div id="pathBox" style="display:flex;gap:8px;justify-content:center;margin-bottom:12px">
        <input id="pathInput" style="width:420px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:Consolas,monospace" 
               placeholder="C:\Users\USER\Nutstore\1\LifeUp\LifeupBackup.zip">
        <button class="btn btn-primary" onclick="loadByPath()" style="font-size:14px;padding:10px 20px">📂 加载存档</button>
      </div>
      <p style="font-size:11px;color:var(--text2);text-align:center">
        默认路径：C:\Users\USER\Nutstore\1\LifeUp\LifeupBackup.zip
      </p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>


<script>
// ====== 状态 ======
const API_BASE = '';
// ====== 平台检测 ======
const IS_DESKTOP = !!(window.pywebview && window.pywebview.api);
const DEFAULT_PATH = 'C:\\Users\\USER\\Nutstore\\1\\LifeUp\\LifeupBackup.zip';

async function api(path, opts = {}) {
  const url = API_BASE + path;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({error: res.statusText}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ====== 消息提示 ======
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ====== 打开存档对话框 ======
function showOpenDialog() {
  if (IS_DESKTOP) {
    openNativeFileDialog();
    return;
  }
  const saved = localStorage.getItem('lifeup_backup_path') || DEFAULT_PATH;
  showModal('📂 打开备份存档', `
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px">输入 LifeUp 备份 ZIP 文件的完整路径</p>
    <div class="form-group">
      <label>备份文件路径</label>
      <input id="f_openpath" value="${saved.replace(/\\/g,'\\\\')}" style="font-family:Consolas,monospace">
    </div>
    <p style="font-size:10px;color:var(--text2);margin-bottom:8px">
      常用路径：C:\\Users\\USER\\Nutstore\\1\\LifeUp\\LifeupBackup.zip
    </p>
    <div class="modal-actions">
      <button class="btn btn-cyan" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="doOpenBackup()">📂 加载</button>
    </div>
  `);
  setTimeout(() => {
    const inp = document.getElementById('f_openpath');
    if (inp) { inp.focus(); inp.select(); }
  }, 100);
}

async function openNativeFileDialog() {
  try {
    const path = await window.pywebview.api.open_file_dialog();
    if (!path) return;
    await _loadBackup(path);
  } catch (err) {
    // pywebview 不可用时回退到手动输入
    const saved = localStorage.getItem('lifeup_backup_path') || DEFAULT_PATH;
    showModal('📂 打开备份存档', `
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">输入 LifeUp 备份 ZIP 文件的完整路径</p>
      <div class="form-group">
        <label>备份文件路径</label>
        <input id="f_openpath" value="${saved.replace(/\\/g,'\\\\')}" style="font-family:Consolas,monospace">
      </div>
      <div class="modal-actions">
        <button class="btn btn-cyan" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="doOpenBackup()">📂 加载</button>
      </div>
    `);
  }
}

async function doOpenBackup() {
  const path = document.getElementById('f_openpath').value.trim();
  if (!path) return toast('请输入文件路径', 'error');
  closeModal();
  await _loadBackup(path);
}

async function _loadBackup(path, silent = false) {
  document.getElementById('filePath').textContent = path.split('\\').pop();
  document.getElementById('connText').textContent = '加载中...';
  document.getElementById('connDot').className = 'conn-dot';

  try {
    const res = await api('/api/open', {
      method: 'POST',
      body: JSON.stringify({ path })
    });
    document.getElementById('connDot').className = 'conn-dot online';
    document.getElementById('connText').textContent = '已加载';
    document.getElementById('saveBtn').disabled = false;
    localStorage.setItem('lifeup_backup_path', path);
    if (IS_DESKTOP) {
      try { window.pywebview.api.save_last_path(path); } catch(e) {}
    }
    loadCurrentPage();
    if (!silent) toast('存档加载成功');
  } catch (err) {
    document.getElementById('connDot').className = 'conn-dot offline';
    document.getElementById('connText').textContent = '加载失败';
    if (!silent) toast('加载失败: ' + err.message, 'error');
    throw err;
  }
}

async function loadByPath() {
  const path = document.getElementById('pathInput').value.trim();
  if (!path) return toast('请输入文件路径', 'error');
  await _loadBackup(path);
}

async function saveBackup() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const res = await api('/api/save', { method: 'POST', body: JSON.stringify({}) });
    toast('💾 存档已保存！请在手机端恢复备份');
    btn.textContent = '💾 已保存';
    setTimeout(() => { btn.disabled = false; btn.textContent = '💾 保存'; }, 1500);
  } catch (err) {
    toast('❌ 保存失败: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '💾 保存';
  }
}

// ====== 导航 ======
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    loadPage(item.dataset.page);
  });
});

function loadPage(page) {
  const titles = {
    dashboard:'📊 修行总览', tasks:'📋 任务管理', items:'🏪 商店管理',
    achievements:'🏆 成就管理', skills:'⚔️ 属性面板', inventory:'🎒 背包物品'
  };
  document.getElementById('pageTitle').textContent = titles[page] || page;
  loadCurrentPage();
}

function loadCurrentPage() {
  const page = document.querySelector('.nav-item.active').dataset.page;
  const loaders = {
    dashboard: loadDashboard, tasks: loadTasks, items: loadItems,
    achievements: loadAchievements, skills: loadSkills, inventory: loadInventory
  };
  if (loaders[page]) loaders[page]();
}

// ====== 总览 ======
async function loadDashboard() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
  try {
    const d = await api('/api/dashboard');

    const skillsHtml = (d.skills||[]).map(s => {
      const name = s.name || '?';
      const icon = s.icon && s.icon.startsWith('http') ? `<img src="${s.icon}" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;border-radius:4px">` : '';
      return `<div class="stat-card" style="text-align:left;padding:14px">
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px">${icon}${name}</div>
        <div style="font-size:28px;font-weight:700;color:var(--purple);margin-bottom:4px">Lv.${s.level||1}</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px">EXP: ${(s.experience||0).toLocaleString()}</div>
        <div class="progress-bar"><div class="progress-fill cyan" style="width:${s.progress||0}%"></div></div>
      </div>`;
    }).join('');

    c.innerHTML = `
      <div style="margin-bottom:20px">
        <span style="font-size:14px;color:var(--text2)">修行者：</span>
        <span style="font-size:16px;color:var(--gold);font-weight:700">${d.user?.nickname||'?'}</span>
        <span style="margin-left:20px;font-size:14px;color:var(--text2)">修行境界：</span>
        <span style="font-size:16px;color:var(--purple2);font-weight:700">Lv.${d.level?.current||1}</span>
        <span style="margin-left:4px;font-size:12px;color:var(--text2)">(${(d.level?.total_exp||0).toLocaleString()} EXP)</span>
        <div class="progress-bar" style="margin-top:8px;width:300px"><div class="progress-fill gold" style="width:${d.level?.progress||0}%"></div></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">📋 活跃任务</div>
          <div class="stat-value cyan">${d.tasks?.active||0}<span style="font-size:14px;color:var(--text2)">/${d.tasks?.total||0}</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">✅ 已完成</div>
          <div class="stat-value green">${d.tasks?.done||0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🏪 商品总数</div>
          <div class="stat-value gold">${d.items?.total||0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🏆 成就进度</div>
          <div class="stat-value purple">${d.achievements?.done||0}<span style="font-size:14px;color:var(--text2)">/${d.achievements?.total||0}</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🎒 背包物品</div>
          <div class="stat-value cyan">${d.items?.inventory||0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">💎 金币余额</div>
          <div class="stat-value gold">${(d.coins||0).toLocaleString()}</div>
        </div>
      </div>
      <h3 style="color:var(--purple2);margin-bottom:12px">⚔️ 六维属性</h3>
      <div class="stats-grid">${skillsHtml || '<div class="empty">暂无属性</div>'}</div>
    `;
  } catch(e) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">❌</div>加载失败: ${e.message}<br><small>请先打开备份存档</small></div>`;
  }
}

// ====== 任务 ======
let taskFilter = 'all';

async function loadTasks(filter = 'all') {
  taskFilter = filter;
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const tasks = await api(`/api/tasks?filter=${filter}`);
    const cats = await api('/api/categories/tasks').catch(() => []);

    const freqMap = {0:'单次',1:'每日',2:'每周',3:'每月',4:'每年',5:'无限'};
    const statusMap = {0:'⏳ 进行中', 1:'✅ 已完成'};
    const rows = tasks.map(t => {
      const js = JSON.stringify(t).replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      return `<tr>
        <td>${t.id||''}</td>
        <td>${statusMap[t.done]||'?'} <strong>${t.title||'?'}</strong></td>
        <td><span class="badge badge-cyan">${freqMap[t.frequency]||t.frequency}</span></td>
        <td>🪙 ${t.coin||0}</td>
        <td>✨ ${t.exp||0}</td>
        <td>${t.done_count||0}/${t.target_count||'∞'}</td>
        <td><span class="badge badge-purple">${t.category_name||'-'}</span></td>
        <td>
          <button class="btn btn-cyan btn-sm" onclick='editTask(${t.id})'>✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">🗑️</button>
        </td>
      </tr>`;
    }).join('');

    c.innerHTML = `
      <div class="btn-group">
        <button class="btn btn-primary" onclick="showAddTask()">➕ 新建任务</button>
        <button class="btn btn-cyan btn-sm" onclick="loadTasks(taskFilter)">🔄 刷新</button>
        <span style="color:var(--text2);font-size:12px">筛选：</span>
        <span class="filter-tag ${filter==='all'?'active':''}" onclick="loadTasks('all')">全部</span>
        <span class="filter-tag ${filter==='active'?'active':''}" onclick="loadTasks('active')">进行中</span>
        <span class="filter-tag ${filter==='done'?'active':''}" onclick="loadTasks('done')">已完成</span>
      </div>

// ====== Modal ======
function showModal(title, body) {
  document.getElementById('modalBox').innerHTML = `<h3>${title}</h3>${body}`;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ====== 键盘快捷键 ======
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveBackup(); }
});

// ====== 自动尝试加载 ======
window.addEventListener('DOMContentLoaded', async () => {
  if (IS_DESKTOP) {
    // 桌面版：从 config 获取上次路径
    try {
      const path = await window.pywebview.api.get_last_path();
      if (path) await _loadBackup(path, true);
    } catch(e) { /* 首次使用 */ }
    return;
  }
  // 浏览器版：从 localStorage 获取
  const saved = localStorage.getItem('lifeup_backup_path') || DEFAULT_PATH;
  const inp = document.getElementById('pathInput');
  if (inp) inp.value = saved;
  try {
    await _loadBackup(saved, true);
  } catch(e) { /* 服务器未启动或路径变了 */ }
});
</script>
</body>
</html>
