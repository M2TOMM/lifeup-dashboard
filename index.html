<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诸天万界 · LifeUp 存档管理器</title>
<style>
/* ========== Theme Variables ========== */
:root {
  --bg: #0a0e17; --bg2: #111827; --bg3: #1a2332; --border: #1e3a5f;
  --text: #c9d1d9; --text2: #8b949e; --gold: #d4a843; --gold2: #f0c060;
  --cyan: #56b6c2; --cyan2: #7acfd6; --red: #e0556a; --green: #4caf50;
  --purple: #a78bfa; --purple2: #c4b5fd; --orange: #e09040;
  --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
body.light-mode {
  --bg: #f0f2f5; --bg2: #fff; --bg3: #fafafa; --border: #d0d5dd;
  --text: #1a1a2e; --text2: #6b7280; --gold: #b8860b; --gold2: #d4a843;
  --cyan: #0891b2; --cyan2: #06b6d4; --red: #dc2626; --green: #16a34a;
  --purple: #7c3aed; --purple2: #8b5cf6; --orange: #ea580c;
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
}

/* ========== Reset & Base ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; overflow: hidden;
}

/* ========== Sidebar ========== */
.sidebar {
  width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 6px 0; flex-shrink: 0; overflow-y: auto;
}
.sidebar-title {
  padding: 6px 20px 14px; font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px;
}
.nav-item {
  padding: 9px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text2); transition: all 0.15s; border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(212,168,67,0.08); }
.nav-icon { font-size: 16px; width: 22px; text-align: center; }

/* ========== Main Layout ========== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header {
  padding: 10px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; flex-wrap: wrap; gap: 8px;
}
.header h2 { font-size: 16px; font-weight: 600; color: var(--cyan); white-space: nowrap; }
.conn-status { display: flex; align-items: center; gap: 8px; font-size: 12px; flex-wrap: wrap; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; }
.conn-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
.conn-dot.offline { background: var(--red); }
.file-path {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  padding: 4px 10px; border-radius: 4px; font-size: 11px; max-width: 260px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace;
}
.theme-toggle {
  background: transparent; border: 1px solid var(--border); color: var(--text2);
  padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 16px; line-height: 1;
}
.theme-toggle:hover { color: var(--gold); border-color: var(--gold); }

/* ========== Content ========== */
.content { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 60px; }

/* ========== Stats Grid ========== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; text-align: center; transition: transform 0.15s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.stat-value { font-size: 28px; font-weight: 700; }
.stat-value.gold { color: var(--gold); }
.stat-value.cyan { color: var(--cyan); }
.stat-value.purple { color: var(--purple); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }

/* ========== Tables ========== */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: var(--bg2); padding: 10px 12px; text-align: left; font-weight: 600;
  color: var(--cyan); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1;
}
.data-table td { padding: 8px 12px; border-bottom: 1px solid rgba(30,58,95,0.3); vertical-align: middle; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.data-table input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: var(--cyan); }

/* ========== Buttons ========== */
.btn {
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
}
.btn-primary { background: var(--gold); color: #000; }
.btn-primary:hover { background: var(--gold2); }
.btn-cyan { background: var(--cyan); color: #000; }
.btn-cyan:hover { background: var(--cyan2); }
.btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { filter: brightness(1.2); }
.btn-purple { background: var(--purple); color: #000; }
.btn-purple:hover { background: var(--purple2); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-xs { padding: 2px 8px; font-size: 10px; }
.btn-group { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }

/* ========== Modal ========== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; width: 560px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow);
}
.modal h3 { color: var(--gold); margin-bottom: 16px; font-size: 16px; }
.modal.wide { width: 720px; }

/* ========== Forms ========== */
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 13px; font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ========== Tabs ========== */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab {
  padding: 6px 16px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--text2); transition: all 0.2s;
}
.tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
.tab:hover:not(.active) { color: var(--text); border-color: var(--cyan); }

/* ========== Search ========== */
.search-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.search-input {
  padding: 7px 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 13px; width: 260px; outline: none;
}
.search-input:focus { border-color: var(--cyan); }
.search-input::placeholder { color: var(--text2); }
.search-clear { color: var(--text2); cursor: pointer; font-size: 14px; padding: 2px 6px; }

/* ========== Filter Tags ========== */
.filter-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-tag {
  padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; transition: all 0.2s;
  background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
}
.filter-tag.active { background: var(--cyan); color: #000; border-color: var(--cyan); }
.filter-tag:hover:not(.active) { border-color: var(--gold); color: var(--text); }

/* ========== Badges ========== */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
}
.badge-cyan { background: rgba(86,182,194,0.2); color: var(--cyan); }
.badge-gold { background: rgba(212,168,67,0.2); color: var(--gold); }
.badge-purple { background: rgba(167,139,250,0.2); color: var(--purple); }
.badge-red { background: rgba(224,85,106,0.2); color: var(--red); }
.badge-green { background: rgba(76,175,80,0.2); color: var(--green); }
.badge-orange { background: rgba(224,144,64,0.2); color: var(--orange); }

/* ========== Progress Bars ========== */
.progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.progress-bar.h8 { height: 8px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.progress-fill.gold { background: var(--gold); }
.progress-fill.cyan { background: var(--cyan); }
.progress-fill.purple { background: var(--purple); }
.progress-fill.green { background: var(--green); }

/* ========== Toast ========== */
.toast {
  position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 200;
  transform: translateY(100px); opacity: 0; transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }

/* ========== Batch Bar ========== */
.batch-bar {
  position: fixed; bottom: 0; left: 220px; right: 0; background: var(--bg2);
  border-top: 1px solid var(--cyan); padding: 8px 24px;
  display: none; align-items: center; gap: 10px; z-index: 90; flex-wrap: wrap;
}
.batch-bar.show { display: flex; }
.batch-count { font-size: 12px; color: var(--cyan); font-weight: 600; }

/* ========== Empty/Loading ========== */
.loading { text-align: center; padding: 40px; color: var(--text2); }
.spinner {
  display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* ========== Inventory Card Grid ========== */
.inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.inv-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; text-align: center; position: relative; transition: transform 0.15s, box-shadow 0.15s;
  cursor: default;
}
.inv-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--cyan); }
.inv-card .card-icon { width: 48px; height: 48px; object-fit: contain; margin-bottom: 8px; border-radius: 6px; }
.inv-card .card-icon-placeholder { font-size: 40px; margin-bottom: 8px; opacity: 0.6; }
.inv-card .inv-card-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; word-break: break-all; line-height: 1.3; max-height: 2.6em; overflow: hidden; }
.inv-card .inv-card-meta { display: flex; justify-content: center; gap: 10px; font-size: 11px; color: var(--text2); }
.inv-card .inv-card-star { position: absolute; top: 6px; right: 8px; font-size: 14px; }

/* ========== Synthesis Calculator ========== */
.synth-card.can-synth { border-left: 3px solid var(--green); }
.synth-card.miss-one { border-left: 3px solid var(--orange); }
.synth-card.miss-more { border-left: 3px solid var(--red); opacity: 0.75; }
.synth-card.no-match { border-left: 3px solid var(--border); opacity: 0.5; }
.calc-badge { font-size: 10px; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
.calc-badge.can { background: rgba(76,175,80,0.15); color: var(--green); }
.calc-badge.miss1 { background: rgba(224,144,64,0.15); color: var(--orange); }
.calc-badge.miss2 { background: rgba(224,85,106,0.12); color: var(--red); }
.calc-summary { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.calc-summary-item { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
.calc-summary-item.s-can { background: rgba(76,175,80,0.1); border: 1px solid var(--green); color: var(--green); }
.calc-summary-item.s-miss1 { background: rgba(224,144,64,0.1); border: 1px solid var(--orange); color: var(--orange); }
.calc-summary-item.s-miss2 { background: rgba(224,85,106,0.08); border: 1px solid var(--red); color: var(--red); }
.calc-summary-item.s-active { box-shadow: 0 0 0 2px currentColor; }

/* ========== Card Grid ========== */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.card-item {
  background: var(--bg3); border: 2px solid var(--border); border-radius: var(--radius);
  padding: 12px; text-align: center; transition: all 0.2s;
}
.card-item:hover { border-color: var(--cyan); transform: translateY(-2px); }
.card-item.owned { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,168,67,0.15); }
.card-item .card-icon { font-size: 36px; margin-bottom: 6px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
.card-item .card-name { font-size: 11px; color: var(--text); line-height: 1.3; word-break: break-all; }
.card-item .card-rarity { font-size: 10px; margin-top: 4px; }

/* ========== Timeline ========== */
.timeline { position: relative; padding-left: 32px; }
.timeline::before {
  content: ''; position: absolute; left: 12px; top: 0; bottom: 0;
  width: 2px; background: var(--border);
}
.timeline-item { position: relative; padding: 8px 0; margin-bottom: 8px; }
.timeline-item::before {
  content: ''; position: absolute; left: -24px; top: 14px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--cyan); border: 2px solid var(--bg2);
}
.timeline-time { font-size: 11px; color: var(--text2); }
.timeline-body { font-size: 13px; color: var(--text); margin-top: 2px; }

/* ========== Chart Bars ========== */
.chart-row { display: flex; align-items: flex-end; gap: 4px; height: 200px; padding: 8px 0; }
.chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bar {
  width: 100%; max-width: 40px; border-radius: 4px 4px 0 0; min-height: 2px;
  transition: height 0.3s; cursor: pointer;
}
.chart-bar.coin { background: var(--gold); }
.chart-bar.exp { background: var(--purple); }
.chart-label { font-size: 10px; color: var(--text2); transform: rotate(-45deg); white-space: nowrap; margin-top: 4px; }
.chart-value { font-size: 9px; color: var(--text2); }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 8px; flex-shrink: 0; height: auto; }
  .sidebar-title { display: none; }
  .nav-item { border-left: none; border-bottom: 2px solid transparent; padding: 8px 10px; font-size: 11px; gap: 4px; }
  .nav-item.active { border-left-color: transparent; border-bottom-color: var(--gold); }
  .batch-bar { left: 0; }
  .search-input { width: 180px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .card-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ========== Section Header ========== */
.section-title { font-size: 15px; color: var(--purple2); margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* ========== LVL Buttons ========== */
.lvl-group { display:flex; gap:6px; }
.lvl-btn { padding:6px 12px; border-radius:4px; border:1px solid var(--border); cursor:pointer; font-size:13px; text-align:center; background:var(--bg); color:var(--text2); transition:all 0.15s; user-select:none; }
.lvl-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.lvl-btn.active { background: var(--cyan); color: #fff; border-color: var(--cyan); font-weight:700; }
.lvl-group .lvl-btn:nth-child(1).active { background: var(--green); border-color: var(--green); }
.lvl-group .lvl-btn:nth-child(2).active { background: var(--cyan); border-color: var(--cyan); }
.lvl-group .lvl-btn:nth-child(3).active { background: var(--purple); border-color: var(--purple); }
.lvl-group .lvl-btn:nth-child(4).active { background: var(--red); border-color: var(--red); }
.attr-check input { accent-color: inherit; }
.attr-check:hover { background: rgba(255,255,255,0.05); }
</style>
</head>
<body>

<!-- ========== Sidebar ========== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-title">☯ 诸天万界</div>
  <nav>
    <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> 修行总览</div>

<!-- ========== Main Area ========== -->
<div class="main">
  <header class="header">
    <h2 id="pageTitle">📊 修行总览</h2>
    <div class="conn-status">
      <span class="file-path" id="filePath" title="">未加载存档</span>
      <div class="conn-dot offline" id="connDot"></div>
      <span id="connText" style="font-size:11px;color:var(--text2)">未加载</span>

               placeholder="C:\Users\USER\Nutstore\1\LifeUp\LifeupBackup.zip">
        <button class="btn btn-primary" onclick="loadByPath()" style="font-size:14px;padding:10px 20px">📂 加载存档</button>
      </div>
      <p style="font-size:11px;color:var(--text2);text-align:center">
        默认路径：C:\Users\USER\Nutstore\1\LifeUp\LifeupBackup.zip
      </p>
    </div>
  </div>
</div>

<!-- ========== Modal ========== -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal" id="modalBox"></div>
</div>

<!-- ========== Toast ========== -->
<div class="toast" id="toast"></div>

<!-- ========== Batch Bar ========== -->
<div class="batch-bar" id="batchBar">
  <span class="batch-count" id="batchCount">已选 0 项</span>
  <button class="btn btn-cyan btn-sm" id="batchEnableBtn" style="display:none" onclick="batchAction(currentBatchType,'enable')">▶️ 启用</button>
  <button class="btn btn-sm" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border);display:none" id="batchDisableBtn" onclick="batchAction(currentBatchType,'disable')">⏸️ 停用</button>
  <button class="btn btn-sm" style="background:var(--bg3);color:var(--gold);border:1px solid var(--gold);display:none" id="batchPriceBtn" onclick="batchPriceDialog()">💰 批量改价</button>
  <button class="btn btn-danger btn-sm" id="batchDeleteBtn" onclick="batchAction(currentBatchType,'delete')">🗑️ 批量删除</button>
  <button class="btn btn-sm" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)" onclick="clearAllChecks()">✕ 取消选择</button>
</div>


<script>
/* =================================================================================
 *  LifeUp Dashboard - Complete Frontend
 *  All 14 modules + search/filter + batch ops + snapshots + realms
 * ================================================================================= */

// ====== Constants ======
const API_BASE = '';
const IS_DESKTOP = !!(window.pywebview && window.pywebview.api);
const DEFAULT_PATH = 'C:\\Users\\USER\\Nutstore\\1\\LifeUp\\LifeupBackup.zip';

// ====== Page State (search persistence) ======
const pageStates = {
  tasks: { filter: 'all', search: '', category: '' },
  items: { search: '', category: '' },
  synthesis: { search: '', category: '', calcMode: false },
  achievements: { search: '', category: '' },
  collection: { search: '', rarity: '' },
  inventory: { search: '', view: 'cards' },
  history: { dateFrom: '', dateTo: '' }
};
let currentBatchType = 'tasks';
let currentPage = 'dashboard';
let currentSort = { col: null, asc: true };

// ====== Sort Helper ======
function sortData(rows, col, asc) {
  return rows.slice().sort(function(a, b) {
    var va = a[col], vb = b[col];
    if (va == null) va = ''; if (vb == null) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return asc ? va - vb : vb - va;
    return asc ? String(va).localeCompare(String(vb), 'zh') : String(vb).localeCompare(String(va), 'zh');
  });
}
function renderSortIcon(colKey, label) {
  if (currentSort.col !== colKey) return label;
  return label + (currentSort.asc ? ' ▲' : ' ▼');
}
function makeSortable(th_html, colKey) {
  return '<th onclick="sortClick(\'' + colKey + '\')" style="cursor:pointer;user-select:none">' + renderSortIcon(colKey, th_html) + '</th>';
}
function sortClick(col) {
  if (currentSort.col === col) currentSort.asc = !currentSort.asc;
  else { currentSort.col = col; currentSort.asc = true; }
  loadCurrentPage();
}

// ====== API Helper ======
async function api(path, opts = {}) {
  const url = API_BASE + path;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ====== Toast ======
function toast(msg, type) {
  type = type || 'success';
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ====== Theme Toggle ======
function toggleTheme() {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('lifeup_theme', isLight ? 'light' : 'dark');
}
(function initTheme() {
  if (localStorage.getItem('lifeup_theme') === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('themeBtn').textContent = '☀️';
  }
})();

// ====== Modal ======
function showModal(title, bodyHtml, wide) {
  document.getElementById('modalBox').innerHTML =
    '<h3>' + title + '</h3>' + bodyHtml;
  if (wide) document.getElementById('modalBox').classList.add('wide');
  else document.getElementById('modalBox').classList.remove('wide');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}
function overlayClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

// ====== Navigation ======
document.querySelectorAll('.nav-item').forEach(function(item) {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(function(i) { i.classList.remove('active'); });
    item.classList.add('active');
    loadPage(item.dataset.page);
  });
});

var pageTitles = {
  dashboard:'📊 修行总览', tasks:'📋 任务管理', items:'🏪 商店管理',
  achievements:'🏆 成就管理', skills:'⚔️ 属性面板', inventory:'🎒 背包物品',
  synthesis:'🔮 合成配方', history:'📜 活动记录', pools:'🎰 卡池管理',
  achprogress:'📈 成就进度', collection:'🃏 卡牌图鉴', economy:'📊 经济看板',
  snapshots:'📸 快照管理', realms:'🌌 位面切换'
};

function loadPage(page) {
  currentPage = page;
  document.getElementById('pageTitle').textContent = pageTitles[page] || page;
  hideBatchBar();
  loadCurrentPage();
}

function loadCurrentPage() {
  var page = currentPage;
  var loaders = {
    dashboard: loadDashboard, tasks: loadTasks, items: loadItems,
    achievements: loadAchievements, skills: loadSkills, inventory: loadInventory,
    synthesis: loadSynthesis, history: loadHistory, pools: loadPools,
    achprogress: loadAchProgress, collection: loadCollection, economy: loadEconomy,
    snapshots: loadSnapshots, realms: loadRealms
  };
  if (loaders[page]) loaders[page]();
}

// ====== Batch Bar ======
function updateBatchBar(type) {
  currentBatchType = type;
  var checks = document.querySelectorAll('.batch-check:checked');
  var count = checks.length;
  document.getElementById('batchCount').textContent = '已选 ' + count + ' 项';
  if (count > 0) {
    document.getElementById('batchBar').classList.add('show');
    document.getElementById('batchEnableBtn').style.display = type === 'tasks' ? 'inline-flex' : 'none';
    document.getElementById('batchDisableBtn').style.display = 'inline-flex';
    document.getElementById('batchPriceBtn').style.display = type === 'items' ? 'inline-flex' : 'none';
    document.getElementById('batchDeleteBtn').style.display = 'inline-flex';
  } else {
    hideBatchBar();
  }
}
function hideBatchBar() {
  document.getElementById('batchBar').classList.remove('show');
}
function toggleAllChecks(e, className) {
  var checks = document.querySelectorAll('.' + className);
  checks.forEach(function(c) { c.checked = e.checked; });
  updateBatchBar(currentBatchType);
}
function clearAllChecks() {
  document.querySelectorAll('.batch-check').forEach(function(c) { c.checked = false; });
  hideBatchBar();
}
function getSelectedIds() {
  return Array.from(document.querySelectorAll('.batch-check:checked')).map(function(c) { return parseInt(c.value); });
}
function batchAction(type, action) {
  var ids = getSelectedIds();
  if (ids.length === 0) return toast('请至少选择一项', 'error');
  if (action === 'delete' && !confirm('确定删除选中的 ' + ids.length + ' 项吗？此操作不可撤销。')) return;
  var body = { ids: ids, action: action };
  api('/api/' + type + '/batch', { method: 'POST', body: JSON.stringify(body) }).then(function(r) {
    toast('✅ 已处理 ' + (r.affected || ids.length) + ' 项');
    clearAllChecks();
    if (type === 'tasks') loadTasks(pageStates.tasks.filter);
    else loadItems();
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}
function batchPriceDialog() {
  var ids = getSelectedIds();
  if (ids.length === 0) return toast('请至少选择一项', 'error');
  showModal('💰 批量改价', '<div class="form-group"><label>新价格</label><input id="f_batchprice" type="number" value="0" style="font-size:18px"></div><div class="modal-actions"><button class="btn btn-cyan" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doBatchPrice()">确认修改 ' + ids.length + ' 件商品</button></div>');
  setTimeout(function() { var inp = document.getElementById('f_batchprice'); if (inp) inp.focus(); }, 100);
}
function doBatchPrice() {
  var price = parseInt(document.getElementById('f_batchprice').value);
  var ids = getSelectedIds();
  if (isNaN(price)) return toast('请输入有效价格', 'error');
  closeModal();
  api('/api/items/batch', { method: 'POST', body: JSON.stringify({ ids: ids, action: 'price', price: price }) }).then(function(r) {
    toast('✅ 已更新 ' + (r.affected || ids.length) + ' 件商品价格为 ' + price);
    clearAllChecks();
    loadItems();
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

// ====== Archive Open / Save ======
function showOpenDialog() {
  if (IS_DESKTOP) {
    openNativeFileDialog();
    return;
  }
  var saved = localStorage.getItem('lifeup_backup_path') || DEFAULT_PATH;
  showModal('📂 打开备份存档',
    '<p style="font-size:12px;color:var(--text2);margin-bottom:12px">输入 LifeUp 备份 ZIP 文件的完整路径</p>' +
    '<div class="form-group"><label>备份文件路径</label><input id="f_openpath" value="' + saved.replace(/\\/g,'\\\\').replace(/"/g,'&quot;') + '" style="font-family:Consolas,monospace"></div>' +
    '<p style="font-size:10px;color:var(--text2);margin-bottom:8px">常用路径：C:\\Users\\USER\\Nutstore\\1\\LifeUp\\LifeupBackup.zip</p>' +
    '<div class="modal-actions"><button class="btn btn-cyan" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doOpenBackup()">📂 加载</button></div>'
  );
  setTimeout(function() { var inp = document.getElementById('f_openpath'); if (inp) { inp.focus(); inp.select(); } }, 100);
}

function openNativeFileDialog() {
  try {
    window.pywebview.api.open_file_dialog().then(function(path) {
      if (!path) return;
      _loadBackup(path);
    });
  } catch(e) { showOpenDialog(); }
}

function doOpenBackup() {
  var path = document.getElementById('f_openpath').value.trim();
  if (!path) return toast('请输入文件路径', 'error');
  closeModal();
  _loadBackup(path);
}

function _loadBackup(path, silent) {
  document.getElementById('filePath').textContent = path.split('\\').pop();
  document.getElementById('connText').textContent = '加载中...';
  document.getElementById('connDot').className = 'conn-dot';
  return api('/api/open', { method: 'POST', body: JSON.stringify({ path: path }) }).then(function(res) {
    document.getElementById('connDot').className = 'conn-dot online';
    document.getElementById('connText').textContent = '已加载';
    document.getElementById('saveBtn').disabled = false;
    localStorage.setItem('lifeup_backup_path', path);
    if (IS_DESKTOP) { try { window.pywebview.api.save_last_path(path); } catch(e) {} }
    loadCurrentPage();
    if (!silent) toast('存档加载成功');
  }).catch(function(err) {
    document.getElementById('connDot').className = 'conn-dot offline';
    document.getElementById('connText').textContent = '加载失败';
    if (!silent) toast('加载失败: ' + err.message, 'error');
    throw err;
  });
}

function loadByPath() {
  var path = document.getElementById('pathInput').value.trim();
  if (!path) return toast('请输入文件路径', 'error');
  _loadBackup(path);
}

function saveBackup() {
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  api('/api/save', { method: 'POST', body: JSON.stringify({}) }).then(function() {
    toast('💾 存档已保存！请在手机端恢复备份');
    btn.textContent = '💾 已保存';
    setTimeout(function() { btn.disabled = false; btn.textContent = '💾 保存'; }, 1500);
  }).catch(function(err) {
    toast('❌ 保存失败: ' + err.message, 'error');
    btn.disabled = false; btn.textContent = '💾 保存';
  });
}

// ====== Escape Key ======
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); hideBatchBar(); clearAllChecks(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveBackup(); }
});

/* =================================================================================
 *  PAGE 1: Dashboard — 修行总览
 * ================================================================================= */
async function loadDashboard() {
  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
  try {
    var d = await api('/api/dashboard');

    var skillsHtml = (d.skills||[]).map(function(s) {
      var icon = s.icon && s.icon.startsWith('http') ? '<img src="' + s.icon + '" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;border-radius:4px">' : '';
      return '<div class="stat-card" style="text-align:left;padding:14px">' +
        '<div style="font-size:12px;color:var(--text2);margin-bottom:4px">' + icon + (s.name||'?') + '</div>' +
        '<div style="font-size:28px;font-weight:700;color:var(--purple);margin-bottom:4px">Lv.' + (s.level||1) + '</div>' +
        '<div style="font-size:11px;color:var(--text2);margin-bottom:6px">EXP: ' + ((s.experience||0).toLocaleString()) + '</div>' +
        '<div class="progress-bar"><div class="progress-fill cyan" style="width:' + (s.progress||0) + '%"></div></div>' +
      '</div>';
    }).join('');

    c.innerHTML =
      '<div style="margin-bottom:20px">' +
        '<span style="font-size:14px;color:var(--text2)">修行者：</span>' +
        '<span style="font-size:16px;color:var(--gold);font-weight:700">' + ((d.user&&d.user.nickname)||'?') + '</span>' +
        '<span style="margin-left:20px;font-size:14px;color:var(--text2)">修行境界：</span>' +
        '<span style="font-size:16px;color:var(--purple2);font-weight:700">Lv.' + ((d.level&&d.level.current)||1) + '</span>' +
        '<span style="margin-left:4px;font-size:12px;color:var(--text2)">(' + ((d.level&&d.level.total_exp||0).toLocaleString()) + ' EXP)</span>' +
        '<div class="progress-bar" style="margin-top:8px;width:300px"><div class="progress-fill gold" style="width:' + (d.level&&d.level.progress||0) + '%"></div></div>' +
        '<div style="margin-top:4px;font-size:11px;color:var(--text2)">连续修炼：' + ((d.record&&d.record.currentusingdaystreak)||0) + ' 天 | 最长：' + ((d.record&&d.record.longestusingdaystreak)||0) + ' 天</div>' +
      '</div>' +
      '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-label">📋 活跃任务</div><div class="stat-value cyan">' + (d.tasks&&d.tasks.active||0) + '<span style="font-size:14px;color:var(--text2)">/' + (d.tasks&&d.tasks.total||0) + '</span></div></div>' +
        '<div class="stat-card"><div class="stat-label">✅ 已完成</div><div class="stat-value green">' + (d.tasks&&d.tasks.done||0) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">🏪 商品总数</div><div class="stat-value gold">' + (d.items&&d.items.total||0) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">🏆 成就进度</div><div class="stat-value purple">' + (d.achievements&&d.achievements.done||0) + '<span style="font-size:14px;color:var(--text2)">/' + (d.achievements&&d.achievements.total||0) + '</span></div></div>' +
        '<div class="stat-card"><div class="stat-label">🎒 背包物品</div><div class="stat-value cyan">' + (d.items&&d.items.inventory||0) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">💎 金币余额</div><div class="stat-value gold">' + ((d.coins||0).toLocaleString()) + '</div></div>' +
      '</div>' +
      '<div class="section-title">⚔️ 六维属性</div>' +
      '<div class="stats-grid">' + (skillsHtml || '<div class="empty">暂无属性</div>') + '</div>' +
      '<div class="btn-group" style="margin-top:16px"><button class="btn btn-cyan btn-sm" onclick="loadDashboard()">🔄 刷新</button></div>';
  } catch(e) {
    c.innerHTML = '<div class="empty"><div class="empty-icon">❌</div>加载失败: ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

/* =================================================================================
 *  PAGE 2: Tasks — 任务管理
 * ================================================================================= */
async function loadTasks(filterArg) {
  if (filterArg !== undefined) pageStates.tasks.filter = filterArg;
  var filter = pageStates.tasks.filter;
  var search = pageStates.tasks.search;
  var catId = pageStates.tasks.category;

  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var qs = filter ? 'filter=' + filter : '';
    if (search) qs += '&search=' + encodeURIComponent(search);
    if (catId) qs += '&category_id=' + catId;
    var tasks = await api('/api/tasks' + (qs ? '?' + qs : ''));
    var cats = await api('/api/categories/tasks').catch(function(){ return []; });
    window._taskCats = cats;

    var freqMap = {0:'单次',1:'每日',2:'每周',3:'每月',4:'每年',5:'无限'};
    var statusMap = {0:'⏳ 进行中', 1:'✅ 已完成'};

    var rows = tasks.map(function(t) {
      return '<tr>' +
        '<td><input type="checkbox" class="batch-check task-check" value="' + t.id + '" onchange="updateBatchBar(\'tasks\')"></td>' +
        '<td>' + (t.id||'') + '</td>' +
        '<td>' + (statusMap[t.done]||'?') + ' <strong>' + (t.title||'?') + '</strong></td>' +
        '<td><span class="badge badge-cyan">' + (freqMap[t.frequency]||t.frequency) + '</span></td>' +
        '<td>' + (t.coin||0) + '</td>' +
        '<td>' + (t.exp||0) + '</td>' +
        '<td>' + (t.priority ? '<span class="badge" style="background:' + ['','#4caf50','#56b6c2','#a78bfa','#e0556a'][t.priority] + '">⚠️LV' + t.priority + '</span>' : '-') + '</td>' +
        '<td><span class="badge" style="background:' + ['','#56b6c2','#a78bfa','#c4b5fd','#e09040'][t.difficulty||1] + '">💀LV' + (t.difficulty||1) + '</span></td>' +
        '<td>' + (t.done_count||0) + '/' + (t.target_count||'∞') + '</td>' +
        '<td><span class="badge badge-purple">' + (t.category_name||'-') + '</span></td>' +
        '<td>' +
          '<button class="btn btn-cyan btn-sm" onclick="editTask(' + t.id + ')">✏️</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteTask(' + t.id + ')">🗑️</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    var catOpts = '<option value="">全部分类</option>' + cats.map(function(c) {
      return '<option value="' + c.id + '"' + (String(c.id)===String(catId)?' selected':'') + '>' + (c.name||c.categoryname) + '</option>';
    }).join('');

    c.innerHTML =
      '<div class="search-bar">' +
        '<input class="search-input" id="taskSearch" placeholder="🔍 搜索任务名称或备注..." value="' + escHtml(search) + '" onkeydown="if(event.key===\'Enter\')taskSearch()">' +
        '<button class="btn btn-cyan btn-sm" onclick="taskSearch()">搜索</button>' +
        (search ? '<span class="search-clear" onclick="taskClearSearch()">✕ 清除</span>' : '') +
        '<span style="margin-left:8px;color:var(--text2);font-size:12px">分类：</span>' +
        '<select id="taskCatFilter" onchange="taskFilterCat()" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;max-width:150px">' + catOpts + '</select>' +
      '</div>' +
      '<div class="btn-group">' +
        '<button class="btn btn-primary" onclick="showAddTask()">➕ 新建任务</button>' +
        '<button class="btn btn-cyan btn-sm" onclick="loadTasks()">🔄 刷新</button>' +
        '<span style="color:var(--text2);font-size:12px">筛选：</span>' +
        '<span class="filter-tag' + (filter==='all'?' active':'') + '" onclick="loadTasks(\'all\')">全部</span>' +
        '<span class="filter-tag' + (filter==='active'?' active':'') + '" onclick="loadTasks(\'active\')">进行中</span>' +
        '<span class="filter-tag' + (filter==='done'?' active':'') + '" onclick="loadTasks(\'done\')">已完成</span>' +
        '<span style="margin-left:12px;color:var(--text2);font-size:11px">共 ' + tasks.length + ' 条</span>' +
        '<span style="margin-left:auto;color:var(--text2);font-size:11px">📋 模板：</span>' +
        '<button class="btn btn-sm btn-purple" onclick="loadTemplatesIntoTaskPage()">📥 载入模板</button>' +
      '</div>' +
      '<div style="overflow-x:auto"><table class="data-table">' +
        '<thead><tr>' +
          '<th><input type="checkbox" onchange="toggleAllChecks(this,\'task-check\')" title="全选/取消"></th>' +
          '<th>ID</th><th>名称</th><th>频率</th><th>🪙</th><th>✨</th><th>重要</th><th>困难</th><th>进度</th><th>分类</th><th>操作</th>' +
        '</tr></thead>' +
        '<tbody>' + (rows || '<tr><td colspan="11" class="empty">暂无任务</td></tr>') + '</tbody>' +
      '</table></div>' +
      '<div id="templatesArea" style="margin-top:12px"></div>';
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

function taskSearch() {
  var v = document.getElementById('taskSearch').value.trim();
  pageStates.tasks.search = v;
  loadTasks();
}
function taskClearSearch() {
  document.getElementById('taskSearch').value = '';
  pageStates.tasks.search = '';
  loadTasks();
}
function taskFilterCat() {
  pageStates.tasks.category = document.getElementById('taskCatFilter').value;
  loadTasks();
}

// --- Task Templates ---
function saveAsTemplate() {
  var t = window._editingTask;
  if (!t) return toast('没有正在编辑的任务', 'error');
  var tmpl = loadTemplates();
  tmpl.push({
    title: t.title || '',
    frequency: t.frequency || 1,
    target_count: t.target_count || 1,
    coin: t.coin || 0,
    exp: t.exp || 0,
    category_id: t.categoryid || t.category_id || 0,
    note: t.note || '',
    savedAt: new Date().toISOString()
  });
  localStorage.setItem('lifeup_task_templates', JSON.stringify(tmpl));
  toast('📋 已保存为模板（共 ' + tmpl.length + ' 个）');
  loadTemplatesIntoTaskPage();
}
function loadTemplates() {
  try { return JSON.parse(localStorage.getItem('lifeup_task_templates') || '[]'); } catch(e) { return []; }
}
function loadTemplatesIntoTaskPage() {
  var area = document.getElementById('templatesArea');
  if (!area) return;
  var tmpls = loadTemplates();
  if (tmpls.length === 0) {
    area.innerHTML = '<div style="font-size:11px;color:var(--text2)">暂无任务模板。编辑任务时可选择"保存为模板"。</div>';
    return;
  }
  var freqMap = {0:'单次',1:'每日',2:'每周',3:'每月',4:'每年',5:'无限'};
  area.innerHTML =
    '<div style="font-size:12px;color:var(--cyan);margin-bottom:6px">📋 任务模板（' + tmpls.length + ' 个）</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
      tmpls.map(function(tm, idx) {
        return '<span class="filter-tag" style="cursor:pointer" onclick="createFromTemplate(' + idx + ')" title="点击快速创建">' +
          (tm.title||'?') + ' · ' + (freqMap[tm.frequency]||'') + ' · 🪙' + (tm.coin||0) +
        '</span>';
      }).join('') +
    '</div>' +
    '<button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="clearTemplates()">🗑️ 清空模板</button>';
}
function createFromTemplate(idx) {
  var tmpls = loadTemplates();
  var tm = tmpls[idx];
  if (!tm) return toast('模板不存在', 'error');
  api('/api/tasks/add', { method: 'POST', body: JSON.stringify({
    title: tm.title, frequency: tm.frequency, target_count: tm.target_count,
    coin: tm.coin, exp: tm.exp, category_id: tm.category_id, note: tm.note
  }) }).then(function() {
    toast('✅ 从模板创建任务成功');
    loadTasks();
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}
function clearTemplates() {
  if (!confirm('确定清空所有任务模板？')) return;
  localStorage.removeItem('lifeup_task_templates');
  toast('🗑️ 模板已清空');
  loadTemplatesIntoTaskPage();
}

function addTask() {
  // 获取重要程度
  var prio = document.getElementById('f_priority').querySelector('.lvl-btn.active');
  var difficulty = document.getElementById('f_difficulty').querySelector('.lvl-btn.active');
  // 获取选中属性
  var checkedAttrs = document.getElementById('f_attrs').querySelectorAll('.attr-checkbox:checked');
  var skillIds = [];
  var attrNames = [];
  [].forEach.call(checkedAttrs, function(cb, i) {
    skillIds.push(parseInt(cb.value));
    attrNames.push(cb.parentElement.textContent.trim());
  });
  while (attrNames.length < 3) attrNames.push('');
  // 获取商品奖励
  var rewardRows = document.getElementById('f_rewards').querySelectorAll('.reward-row');
  var itemRewards = [];
  [].forEach.call(rewardRows, function(row) {
    var sel = row.querySelector('.reward-item');
    var amt = row.querySelector('.reward-amount');
    if (sel && sel.value) itemRewards.push({item_id: parseInt(sel.value), amount: parseInt(amt.value) || 1});
  });

  var data = {
    title: document.getElementById('f_title').value,
    frequency: parseInt(document.getElementById('f_freq').value),
    target_count: parseInt(document.getElementById('f_count').value),
    coin: parseInt(document.getElementById('f_coin').value),
    exp: parseInt(document.getElementById('f_exp').value),
    category_id: parseInt(document.getElementById('f_cat').value) || 0,
    note: document.getElementById('f_note').value,
    priority: prio ? parseInt(prio.getAttribute('data-v')) : 0,
    difficulty: difficulty ? parseInt(difficulty.getAttribute('data-v')) : 1,
    skill_ids: skillIds,
    attr1: attrNames[0],
    attr2: attrNames[1],
    attr3: attrNames[2],
    item_rewards: itemRewards
  };
  if (!data.title) return toast('请输入任务名称', 'error');
  api('/api/tasks/add', { method: 'POST', body: JSON.stringify(data) }).then(function() {
    closeModal();
    loadTasks();
    toast('✅ 任务创建成功');
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

    var cats = window._taskCats || [];

      return '<option value="' + c.id + '"' + (c.id===t.categoryid?' selected':'') + '>' + (c.name||c.categoryname) + '</option>';
    }).join('');
    var freqSel = function(v) {
      return [0,1,2,3,5].map(function(f) {
        return '<option value="' + f + '"' + (f==v?' selected':'') + '>' + {0:'单次',1:'每日',2:'每周',3:'每月',5:'无限'}[f] + '</option>';
      }).join('');
    };

    showModal('✏️ 编辑任务 #' + id,
      '<div class="form-group"><label>任务名称</label><input id="f_title" value="' + escAttr(t.title||'') + '"></div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>频率</label><select id="f_freq">' + freqSel(t.frequency) + '</select></div>' +
        '<div class="form-group"><label>目标次数</label><input id="f_count" type="number" value="' + (t.target_count||1) + '"></div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>💎 金币</label><input id="f_coin" type="number" value="' + (t.coin||0) + '"></div>' +
        '<div class="form-group"><label>✨ 经验</label><input id="f_exp" type="number" value="' + (t.exp||0) + '"></div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>⚠️ 重要程度</label><div id="f_priority" class="lvl-group">' +
          '<span class="lvl-btn" data-v="1" onclick="setLvl(this,\'f_priority\')">LV1</span>' +
          '<span class="lvl-btn" data-v="2" onclick="setLvl(this,\'f_priority\')">LV2</span>' +
          '<span class="lvl-btn" data-v="3" onclick="setLvl(this,\'f_priority\')">LV3</span>' +
          '<span class="lvl-btn" data-v="4" onclick="setLvl(this,\'f_priority\')">LV4</span>' +
        '</div></div>' +
        '<div class="form-group"><label>💀 困难程度</label><div id="f_difficulty" class="lvl-group">' +
          '<span class="lvl-btn" data-v="1" onclick="setLvl(this,\'f_difficulty\')">LV1</span>' +
          '<span class="lvl-btn" data-v="2" onclick="setLvl(this,\'f_difficulty\')">LV2</span>' +
          '<span class="lvl-btn" data-v="3" onclick="setLvl(this,\'f_difficulty\')">LV3</span>' +
          '<span class="lvl-btn" data-v="4" onclick="setLvl(this,\'f_difficulty\')">LV4</span>' +
        '</div></div>' +
      '</div>' +
      '<div class="form-group"><label>📊 关联属性 (1-3个)</label><div id="f_attrs" style="display:flex;flex-wrap:wrap;gap:2px">' +
        (window._attrBoxesHTML || getAttrBoxesHTML()) + '</div></div>' +
      '<div class="form-group"><label>分类</label><select id="f_cat">' + opts + '</select></div>' +
      '<div class="form-group"><label>🎁 商品奖励</label><div id="f_rewards" style="margin-bottom:4px"></div><button class="btn btn-sm btn-cyan" onclick="addRewardRow()">➕ 添加奖励商品</button></div>' +
      '<div class="form-group"><label>备注</label><textarea id="f_note">' + escHtml(t.note||'') + '</textarea></div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-purple btn-sm" onclick="saveAsTemplate()">📋 保存为模板</button>' +
        '<button class="btn btn-cyan" onclick="closeModal()">取消</button>' +
        '<button class="btn btn-primary" onclick="updateTask(' + id + ')">保存</button>' +
      '</div>'
    );
    // 初始化新字段
    setTimeout(function() {
      // 重要程度
      var prioVal = t.priority || 0;
      if (prioVal) {
        var prioBtns = document.getElementById('f_priority').querySelectorAll('.lvl-btn');
        [].forEach.call(prioBtns, function(b) { if (parseInt(b.getAttribute('data-v')) === prioVal) b.classList.add('active'); });
      }
      // 困难程度
      var diffVal = t.difficulty || 1;
      var diffBtns = document.getElementById('f_difficulty').querySelectorAll('.lvl-btn');
      [].forEach.call(diffBtns, function(b) { if (parseInt(b.getAttribute('data-v')) === diffVal) b.classList.add('active'); });
      // 关联属性
      if (t.skill_ids && t.skill_ids.length) {
        var cbs = document.getElementById('f_attrs').querySelectorAll('.attr-checkbox');
        [].forEach.call(cbs, function(cb) { if (t.skill_ids.indexOf(parseInt(cb.value)) >= 0) cb.checked = true; });

      if (t.item_rewards && t.item_rewards.length) {
        t.item_rewards.forEach(function(rw) { addRewardRow(rw.item_id, rw.amount); });
      }
    }, 100);
  }).catch(function(e) { toast('❌ ' + e.message, 'error'); });
}

function updateTask(id) {
  // get priority/difficulty/attrs
  var prio = document.getElementById('f_priority').querySelector('.lvl-btn.active');
  var difficulty = document.getElementById('f_difficulty').querySelector('.lvl-btn.active');
  var checkedAttrs = document.getElementById('f_attrs').querySelectorAll('.attr-checkbox:checked');
  var skillIds = []; var attrNames = [];
  [].forEach.call(checkedAttrs, function(cb, i) {
    skillIds.push(parseInt(cb.value));
    attrNames.push(cb.parentElement.textContent.trim());
  });
  while (attrNames.length < 3) attrNames.push('');
  // get item rewards
  var rewardRows = document.getElementById('f_rewards').querySelectorAll('.reward-row');
  var itemRewards = [];
  [].forEach.call(rewardRows, function(row) {
    var sel = row.querySelector('.reward-item');
    var amt = row.querySelector('.reward-amount');
    if (sel && sel.value) itemRewards.push({item_id: parseInt(sel.value), amount: parseInt(amt.value) || 1});
  });

  var data = {
    id: id,
    title: document.getElementById('f_title').value,
    frequency: parseInt(document.getElementById('f_freq').value),
    target_count: parseInt(document.getElementById('f_count').value),
    coin: parseInt(document.getElementById('f_coin').value),
    exp: parseInt(document.getElementById('f_exp').value),
    category_id: parseInt(document.getElementById('f_cat').value) || 0,

    priority: prio ? parseInt(prio.getAttribute('data-v')) : 0,
    difficulty: difficulty ? parseInt(difficulty.getAttribute('data-v')) : 1,

    attr1: attrNames[0], attr2: attrNames[1], attr3: attrNames[2],
    item_rewards: itemRewards
  };

    closeModal();
    loadTasks();
    toast('✅ 已更新');

function deleteTask(id) {

async function loadAchievements() {
  var search = pageStates.achievements.search;
  var catId = pageStates.achievements.category;

  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var qs = [];
    if (search) qs.push('search=' + encodeURIComponent(search));
    if (catId) qs.push('category_id=' + catId);
    var ach = await api('/api/achievements' + (qs.length ? '?' + qs.join('&') : ''));
    var cats = await api('/api/categories/achievements').catch(function(){ return []; });
    var sysAch = await api('/api/achievements/system').catch(function(){ return []; });
    var statusMap = {0:'🔒 未解锁', 1:'🔓 已解锁', 2:'🎁 已领取'};

    var rows = ach.map(function(a) {
      return '<tr>' +
        '<td>' + (a.id||'') + '</td>' +
        '<td>' + (a.icon&&a.icon.startsWith('http') ? '<img src="' + a.icon + '" style="width:20px;height:20px;vertical-align:middle;margin-right:4px;border-radius:3px">' : '') + ' <strong>' + (a.name||'?') + '</strong></td>' +
        '<td><span class="badge badge-purple">' + (a.category_name||'-') + '</span></td>' +
        '<td><span class="badge badge-' + (a.achievementstatus>=1?'green':'red') + '">' + (statusMap[a.achievementstatus]||a.achievementstatus) + '</span></td>' +
        '<td>🪙 ' + (a.coin||0) + '</td>' +
        '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (a.description||'') + '</td>' +
        '<td>' +
          '<button class="btn btn-cyan btn-sm" onclick="editAchievement(' + a.id + ')">✏️</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteAchievement(' + a.id + ')">🗑️</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    var catOptsAch = '<option value="">全部分类</option>' + cats.map(function(c) {
      return '<option value="' + c.id + '"' + (String(c.id)===String(catId)?' selected':'') + '>' + (c.name||c.categoryname) + '</option>';
    }).join('');

    c.innerHTML =
      '<div class="search-bar">' +
        '<input class="search-input" id="achSearch" placeholder="🔍 搜索成就名称或描述..." value="' + escHtml(search) + '" onkeydown="if(event.key===\'Enter\')achSearch()">' +
        '<button class="btn btn-cyan btn-sm" onclick="achSearch()">搜索</button>' +
        (search ? '<span class="search-clear" onclick="achClearSearch()">✕ 清除</span>' : '') +
        '<span style="margin-left:8px;color:var(--text2);font-size:12px">分类：</span>' +
        '<select id="achCatFilter" onchange="achFilterCat()" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;max-width:150px">' + catOptsAch + '</select>' +
      '</div>' +
      '<div class="btn-group">' +
        '<button class="btn btn-primary" onclick="showAddAchievement()">➕ 新建成就</button>' +
        '<button class="btn btn-cyan btn-sm" onclick="loadAchievements()">🔄 刷新</button>' +
        '<span style="color:var(--text2);font-size:12px">自定义 ' + ach.length + ' 个 | 系统成就 ' + sysAch.length + ' 个</span>' +
        '<span style="margin-left:auto"></span>' +
        '<button class="btn btn-sm btn-purple" onclick="exportTable(\'achievements\')">📥 导出</button>' +
      '</div>' +
      '<div style="overflow-x:auto"><table class="data-table">' +
        '<thead><tr><th>ID</th><th>名称</th><th>分类</th><th>状态</th><th>奖励</th><th>描述</th><th>操作</th></tr></thead>' +
        '<tbody>' + (rows || '<tr><td colspan="7" class="empty">暂无成就</td></tr>') + '</tbody>' +
      '</table></div>' +
      (sysAch.length > 0 ?
        '<div class="section-title">📋 系统成就（只读）</div>' +
        '<div style="overflow-x:auto"><table class="data-table">' +
          '<thead><tr><th>ID</th><th>名称</th><th>类型</th><th>等级</th><th>奖励</th><th>目标值</th></tr></thead>' +
          '<tbody>' + sysAch.map(function(a) {
            return '<tr><td>' + a.id + '</td><td>' + (a.title||'?') + '</td><td>' + (a.achievementtype||0) + '</td><td>' + (a.levelnumber||1) + '</td><td>🪙' + (a.rewardcoin||0) + ' ✨' + (a.rewardexp||0) + '</td><td>' + (a.targetvalue||0) + '</td></tr>';
          }).join('') + '</tbody>' +
        '</table></div>' : '');
  } catch(e) {
    c.innerHTML = '<div class="empty">❌ ' + e.message + '<br><small>请先打开备份存档</small></div>';
  }
}

async function loadInventory() {
  var search = pageStates.inventory.search;
  var view = pageStates.inventory.view;
  var c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    var inv = await api('/api/inventory');
    // Search filter
    if (search) {
      var s = search.toLowerCase();
      inv = inv.filter(function(i) { return (i.item_name||'').toLowerCase().indexOf(s) >= 0; });
    }
    // Sort by current
    if (currentSort.col) inv = sortData(inv, currentSort.col, currentSort.asc);

    // Card view
    var gridHtml = inv.map(function(i) {
      var iconHtml = i.item_icon && i.item_icon.startsWith('http')
        ? '<img src="' + i.item_icon + '" class="card-icon" loading="lazy">'
        : '<div class="card-icon-placeholder">📦</div>';
      return '<div class="inv-card" title="ID: ' + i.id + '">' +
        iconHtml +
        '<div class="inv-card-name">' + (i.item_name || '?') + '</div>' +
        '<div class="inv-card-meta">' +
          '<span>📦 ' + (i.stocknumber || 0) + '</span>' +
          '<span>🪙 ' + (i.price || 0) + '</span>' +
        '</div>' +
        (i.isstarred ? '<div class="inv-card-star">⭐</div>' : '') +
      '</div>';
    }).join('');

    // Table view
    var rows = inv.map(function(i) {
      return '<tr>' +
        '<td>' + (i.id||'') + '</td>' +
        '<td>' + (i.item_icon&&i.item_icon.startsWith('http') ? '<img src="' + i.item_icon + '" style="width:20px;height:20px;vertical-align:middle;margin-right:4px;border-radius:3px">' : '') + ' ' + (i.item_name||'?') + '</td>' +
        '<td>📦 ' + (i.stocknumber||0) + '</td>' +
        '<td><span class="badge badge-gold">🪙 ' + (i.price||0) + '</span></td>' +
        '<td>' + (i.isstarred ? '⭐ 已收藏' : '') + '</td>' +
      '</tr>';
    }).join('');

    c.innerHTML =
      '<div class="btn-group" style="flex-wrap:wrap">' +
        '<button class="btn btn-cyan btn-sm" onclick="loadInventory()">🔄 刷新</button>' +
        '<input id="invSearch" placeholder="🔍 搜索物品..." value="' + escHtml(search) + '" onkeydown="if(event.key===\'Enter\')invSearch()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;font-size:12px;width:160px">' +
        '<button class="btn btn-sm" onclick="invSearch()">搜索</button>' +
        '<span style="color:var(--text2);font-size:12px;margin-left:8px">' + inv.length + ' 件</span>' +
        '<span style="margin-left:auto"></span>' +
